name: Trivy Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  security-events: write

jobs:
  build:
    name: Scan nginx:latest with Trivy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set Date
        id: set-date
        run: echo "DATE=$(date +%m.%d.%Y)" >> "$GITHUB_ENV"

      - name: Create output directory
        run: mkdir -p "GitHub Actions/Trivy Automation"

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Log in to GitHub Container Registry
        if: ${{ env.GHCR_PAT != '' }}
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Trivy filesystem secret scan
        run: |
          OUTPUT_FILE="GitHub Actions/Trivy Automation/scan-results-${DATE}.json"
          trivy fs \
            --scanners secret,vuln \
            --format json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            -o "$OUTPUT_FILE" \
            --exit-code 0 \
          .
      - name: Verify scan results exist
        run: ls -l "GitHub Actions/Trivy Automation/"

      - name: Commit scan results to repository
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "GitHub Actions/Trivy Automation/scan-results-${DATE}.json"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add Trivy scan results (${DATE})"
            git push origin HEAD:main
          fi